<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>荷物さがし</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#4a7a5e">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <div id="status" class="status" hidden></div>

  <section id="setup-view" hidden>
    <p>Microsoftアカウントでサインインすると、OneDrive上の「荷物管理エクスポート」フォルダを読み込みます。</p>
    <button type="button" id="signin-button" class="save-button">Microsoftアカウントでサインイン</button>
  </section>

  <section id="list-view" hidden>
    <form class="search" onsubmit="return false">
      <input type="search" id="search-input" placeholder="名前・メモ・カテゴリで検索" autofocus>
    </form>
    <div class="count" id="count"></div>
    <ul class="item-list" id="item-list"></ul>
    <a href="#" id="settings-link" class="settings-link">サインアウトする</a>
  </section>

  <section id="detail-view" hidden>
    <a href="#" class="back" id="back-link">← 一覧へ</a>
    <h1 id="detail-name"></h1>
    <div class="badge" id="detail-badge" hidden></div>
    <div class="photos" id="detail-photos"></div>
    <dl class="detail">
      <dt>保管場所</dt><dd id="detail-location"></dd>
      <dt>カテゴリ</dt><dd id="detail-category"></dd>
      <dt>メモ</dt><dd id="detail-note"></dd>
      <dt>登録日</dt><dd id="detail-added"></dd>
    </dl>
  </section>
</main>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<script src="app.js"></script>
</body>
</html>
